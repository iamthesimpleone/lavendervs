<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Lavender Vs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500&display=swap" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div id="gate" class="gate" hidden>
  <form id="gate-form" class="gate-card">
    <h1>Lavender Vs</h1>
    <p>Enter the passphrase to continue.</p>
    <input id="gate-input" type="password" autocomplete="off" autofocus />
    <button type="submit">Enter</button>
    <p id="gate-error" class="gate-error" hidden>Not quite — try again.</p>
  </form>
</div>

<main id="site" hidden>

  <section class="hero">
    <img class="hero-img" src="img/hero.jpg" alt="" />
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h1 class="brand">Lavender Vs</h1>
      <nav class="hero-nav">
        <a href="#album">Album</a>
        <a href="#about">About</a>
      </nav>
    </div>
  </section>

  <section id="album" class="album">
    <div class="album-art">
      <img src="img/cover.jpg" alt="Amber Nights album cover" />
      <p class="album-title">Amber Nights</p>
    </div>

    <ol class="tracklist" id="tracklist">
      <!-- populated by app.js -->
    </ol>
  </section>

  <section id="about" class="about">
    <h2>About</h2>
    <p>Lavender Vs is a singer and songwriter. <em>Amber Nights</em> is her debut record.</p>
    <ul class="socials">
      <li><a href="https://open.spotify.com/artist/4Rsxi1otQwPJvNKCp8N3CK" target="_blank" rel="noopener">Spotify</a></li>
      <li><a href="https://lavendervs.bandcamp.com" target="_blank" rel="noopener">Bandcamp</a></li>
      <li><a href="https://music.apple.com/us/artist/lavender-vs/1623070843" target="_blank" rel="noopener">Apple Music</a></li>
      <li><a href="https://instagram.com/lavendervsmusic" target="_blank" rel="noopener">Instagram</a></li>
    </ul>
  </section>

  <footer class="footer">
    <p>&copy; <span id="year"></span> Lavender Vs. All rights reserved.</p>
  </footer>

  <div id="player" class="player" hidden>
    <div class="player-meta">
      <span id="player-title">—</span>
      <span id="player-sub"></span>
    </div>
    <audio id="audio" controls preload="none"></audio>
    <button id="player-close" aria-label="Close player">×</button>
  </div>

</main>

<script src="app.js"></script>
</body>
</html>
